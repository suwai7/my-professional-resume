name: My First Pipeline

on:
    push: 
        branches: ["main"]

permissions:
  id-token: write
  contents: read   

jobs:
    build:
        runs-on: ubuntu-latest
        steps: 
            - name: clone the code
              uses: actions/checkout@v4

            - name: Trivy scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                scan-type: 'fs'
                severity: HIGH,CRITICAL
                exit-code: 1


            - name: Build Docker Image
              run: 
                docker build -t 966969922248.dkr.ecr.us-east-1.amazonaws.com/my-portfolio-image:latest .

            - name: Scan Docker Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
               image-ref: 966969922248.dkr.ecr.us-east-1.amazonaws.com/my-portfolio-image:latest
               format: 'table'
               exit-code: '1'
               ignore-unfixed: true
               severity: 'CRITICAL,HIGH'  
               
            - name: Push Image to ECR
              run: echo "push" 
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4 # More information on this action can be found below in the 'AWS Credentials' section
              with:
                role-to-assume: arn:aws:iam::966969922248:role/github-action-role
                aws-region: us-east-1

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2    
            - name: Push image
              run: 
               docker push  966969922248.dkr.ecr.us-east-1.amazonaws.com/my-portfolio-image:latest  
